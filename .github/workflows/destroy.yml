name: Remove the project in the cloud

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

concurrency:
  group: terraform-structure-data-project
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Recreate state bucket name
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

          BUCKET_NAME="structured-dataproject-tfstate-${REPO_OWNER}-${REPO_NAME}"

          echo "Using Terraform state bucket: $BUCKET_NAME"
          echo "TF_STATE_BUCKET_FINAL=$BUCKET_NAME" >> $GITHUB_ENV

      - name: Check Terraform state bucket exists
        run: |
          aws s3api head-bucket --bucket "${{ env.TF_STATE_BUCKET_FINAL }}"

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET_FINAL }}" \
            -backend-config="key=structured-dataproject/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

      - name: Empty S3
        run: |
          BUCKET="${{ secrets.S3_BUCKET_NAME }}"
          
         
          VERSIONS=$(aws s3api list-object-versions --bucket "$BUCKET" --query 'Versions[].{Key:Key,VersionId:VersionId}')
          if [ "$VERSIONS" != "null" ] && [ -n "$VERSIONS" ]; then
            # Format as proper JSON and save to a file
            echo "{\"Objects\": $VERSIONS}" > delete-versions.json
            aws s3api delete-objects --bucket "$BUCKET" --delete file://delete-versions.json
          fi

         
          MARKERS=$(aws s3api list-object-versions --bucket "$BUCKET" --query 'DeleteMarkers[].{Key:Key,VersionId:VersionId}')
          if [ "$MARKERS" != "null" ] && [ -n "$MARKERS" ]; then
            # Format as proper JSON and save to a file
            echo "{\"Objects\": $MARKERS}" > delete-markers.json
            aws s3api delete-objects --bucket "$BUCKET" --delete file://delete-markers.json
          fi
          
          
           

      - name: Terraform Destroy
        working-directory: ./terraform
        run: |
          terraform destroy -auto-approve \
            -var="bucket_name=${{ secrets.S3_BUCKET_NAME }}"
