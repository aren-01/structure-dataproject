name: Structure Data Project

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      
      - name: Checkout repository
        uses: actions/checkout@v4

      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      
      - name: Terraform Apply
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve \
          -var="bucket_name=${{ secrets.S3_BUCKET_NAME }}"

      
      - name: Get API URL
        working-directory: ./terraform
        run: |
          echo "API_URL=$(terraform output -raw api_url)" >> $GITHUB_ENV

      
      - name: Inject API URL into index.html
        run: |
          cp index-file/index.html index-file/index.tmp.html
          sed -i "s|__API_URL__|$API_URL|g" index-file/index.tmp.html

      
      - name: Upload index.html to S3
        run: |
          aws s3 cp  index-file/index.tmp.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html

      
      - name: Zip Lambda function
        working-directory: ./lambda-function
        run: zip function.zip structured_dataproject.py

      
      - name: Update Lambda code
        working-directory: ./lambda-function
        run: |
          aws lambda update-function-code \
            --function-name structured_function \
            --zip-file fileb://function.zip
