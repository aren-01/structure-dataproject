<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Interface</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #2563eb;
      --brand-strong: #1d4ed8;
      --history-hover: #eff6ff;
      --history-active: #dbeafe;
      --radius: 14px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 5% 5%, #e0edff 0%, transparent 30%),
        radial-gradient(circle at 95% 95%, #eaf7f1 0%, transparent 30%),
        var(--bg);
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
    }

    .topbar {
      background: #06061f;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      gap: 12px;
    }

    .welcome {
      font-size: 18px;
      font-weight: 600;
      white-space: nowrap;
      color: #ffffff;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tiny-title {
      font-size: 12px;
      color: #dbeafe;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .main {
      flex: 1;
      display: flex;
      gap: 16px;
      min-height: 0;
    }

    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .app-box {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .box {
      width: 100%;
      font-size: 16px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      resize: vertical;
      font-family: "Consolas", "Courier New", monospace;
      min-height: 180px;
      background: #fbfdff;
    }

    button {
      padding: 10px 14px;
      font-size: 15px;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover:not(:disabled) {
      background: var(--brand-strong);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .button-row {
      display: flex;
      gap: 10px;
    }

    #submitBtn,
    #saveBtn {
      width: 100%;
    }

    #logoutBtn {
      width: auto;
      min-width: 0;
      background: transparent;
      color: #ffffff;
      padding: 0;
      border-radius: 0;
    }

    #logoutBtn:hover:not(:disabled) {
      background: transparent;
      text-decoration: underline;
    }

    #logoutBtn:active:not(:disabled) {
      transform: none;
    }

    .sidebar {
      width: 280px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      transition: width 0.25s ease;
      overflow: hidden;
    }

    .sidebar.collapsed {
      width: 66px;
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      min-height: 52px;
    }

    .sidebar-title {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
    }

    .collapse-btn {
      width: auto;
      height: auto;
      border-radius: 0;
      padding: 0;
      font-size: 16px;
      line-height: 1;
      background: transparent;
      color: var(--ink);
    }

    .sidebar-content {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      overflow: auto;
    }

    .history-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.08s ease;
      user-select: none;
    }

    .history-item:hover {
      background: var(--history-hover);
      border-color: #bfdbfe;
    }

    .history-item:active {
      transform: scale(0.99);
    }

    .history-item.active {
      background: var(--history-active);
      border-color: #93c5fd;
    }


    .sidebar.collapsed .sidebar-title,
    .sidebar.collapsed .sidebar-content {
      display: none;
    }

    @media (max-width: 980px) {
      .main {
        flex-direction: column;
      }

      .sidebar,
      .sidebar.collapsed {
        width: 100%;
      }

      .sidebar.collapsed .sidebar-title,
      .sidebar.collapsed .sidebar-content {
        display: block;
      }
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <header class="topbar">
      <div id="welcomeText" class="welcome">Structure Your Data</div>
      <div class="topbar-right">
        <div class="tiny-title">Hi there!</div>
        <span id="logoutBtn" role="link" tabindex="0" style="cursor: pointer;">Logout</span>
      </div>
    </header>

    <div class="main">
      <div class="workspace">
        <div class="app-box">
          <textarea id="outputBox" class="box" placeholder="Structured output will appear here..." disabled></textarea>
          <textarea id="inputBox" class="box" placeholder="Type here..."></textarea>
          <div class="button-row">
            <button id="submitBtn">Structure it!</button>
            <button id="saveBtn" disabled>Save</button>
          </div>
        </div>
      </div>

      <aside id="historySidebar" class="sidebar">
        <div class="sidebar-head">
          <button id="collapseBtn" class="collapse-btn" aria-label="Collapse sidebar">&gt;</button>
          <div class="sidebar-title">History</div>
        </div>
        <div class="sidebar-content">
         
          <ul id="historyList" class="history-list">
            <li class="history-item">Saved items will appear here after login.</li>
          </ul>
        </div>
      </aside>
    </div>
  </div>


  <script>
    const historySidebar = document.getElementById("historySidebar");
    const collapseBtn = document.getElementById("collapseBtn");

    collapseBtn.addEventListener("click", () => {
      const isCollapsed = historySidebar.classList.toggle("collapsed");
      collapseBtn.innerHTML = isCollapsed ? "&lt;" : "&gt;";
      collapseBtn.setAttribute("aria-label", isCollapsed ? "Expand sidebar" : "Collapse sidebar");
    });

    const API_BASE_URL = "__API_URL__/project-stage";
    const GENERATE_URL = `${API_BASE_URL}/generate`;
    const SAVE_URL = `${API_BASE_URL}/save`;
    const SAVED_URL = `${API_BASE_URL}/saved`;

    const inputBox = document.getElementById("inputBox");
    const outputBox = document.getElementById("outputBox");
    const submitBtn = document.getElementById("submitBtn");
    const saveBtn = document.getElementById("saveBtn");
    const historyList = document.getElementById("historyList");
    const logoutBtn = document.getElementById("logoutBtn");

    let latestOutput = null;

    function getIdToken() {
      return localStorage.getItem("app_id_token");
    }

    function requireLogin() {
      const idToken = getIdToken();
      if (!idToken) {
        outputBox.value = "You are not logged in.";
        window.location.href = "login";
        return null;
      }
      return idToken;
    }

    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem("app_id_token");
      window.location.href = "login";
    });

    submitBtn.addEventListener("click", async () => {
      const prompt = inputBox.value.trim();
      const idToken = requireLogin();

      if (!idToken) return;

      if (!prompt) {
        outputBox.value = "Please enter some text.";
        return;
      }

      submitBtn.disabled = true;
      saveBtn.disabled = true;
      latestOutput = null;
      outputBox.value = "Processing...";

      try {
        const res = await fetch(GENERATE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${idToken}`
          },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        if (!res.ok) {
          outputBox.value = JSON.stringify(data, null, 2);
          return;
        }

        latestOutput = data.output;
        outputBox.value = JSON.stringify(latestOutput, null, 2);
        saveBtn.disabled = false;

      } catch (error) {
        outputBox.value = "Error! " + error.message;
      } finally {
        submitBtn.disabled = false;
      }
    });

    saveBtn.addEventListener("click", async () => {
      const idToken = requireLogin();

      if (!idToken) return;

      if (!latestOutput) {
        outputBox.value = "Please structure data before saving.";
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";

      try {
        const res = await fetch(SAVE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${idToken}`
          },
          body: JSON.stringify({ output: latestOutput })
        });

        const data = await res.json();

        if (!res.ok) {
          outputBox.value = JSON.stringify(data, null, 2);
          saveBtn.disabled = false;
          return;
        }

        outputBox.value = JSON.stringify(data.item.output, null, 2);
        await loadSavedItems();

      } catch (error) {
        outputBox.value = "Error! " + error.message;
        saveBtn.disabled = false;
      } finally {
        saveBtn.textContent = "Save";
      }
    });

    async function loadSavedItems() {
      const idToken = getIdToken();

      if (!idToken) {
        window.location.href = "login";
        return;
      }

      try {
        const res = await fetch(SAVED_URL, {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${idToken}`
          }
        });

        const data = await res.json();

        if (!res.ok) {
          historyList.innerHTML = `<li class="history-item">Could not load saved items.</li>`;
          return;
        }

        renderSavedItems(data.items || []);

      } catch (error) {
        historyList.innerHTML = `<li class="history-item">Error loading saved items.</li>`;
      }
    }

    function renderSavedItems(items) {
      historyList.innerHTML = "";

      if (!items.length) {
        historyList.innerHTML = `<li class="history-item">No saved items yet.</li>`;
        return;
      }

      items.forEach((item) => {
        const li = document.createElement("li");
        li.className = "history-item";

        const output = item.output || {};
        const label = output.name || output.title || output.major || item.id || "Saved item";
        const date = item.createdAt ? new Date(item.createdAt).toLocaleString() : "";

        li.textContent = date ? `${label} — ${date}` : label;
        li.title = JSON.stringify(output, null, 2);

        li.addEventListener("click", () => {
          document.querySelectorAll(".history-item").forEach((el) => el.classList.remove("active"));
          li.classList.add("active");
          latestOutput = output;
          outputBox.value = JSON.stringify(output, null, 2);
          saveBtn.disabled = false;
        });

        historyList.appendChild(li);
      });
    }

    loadSavedItems();
  </script>

</body>
</html>
