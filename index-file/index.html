<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Interface</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #2563eb;
      --brand-strong: #1d4ed8;
      --history-hover: #eff6ff;
      --history-active: #dbeafe;
      --radius: 14px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 5% 5%, #e0edff 0%, transparent 30%),
        radial-gradient(circle at 95% 95%, #eaf7f1 0%, transparent 30%),
        var(--bg);
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
    }

    .topbar {
      background: #06061f;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      gap: 12px;
    }

    .welcome {
      font-size: 18px;
      font-weight: 600;
      white-space: nowrap;
      color: #ffffff;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tiny-title {
      font-size: 12px;
      color: #dbeafe;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .main {
      flex: 1;
      display: flex;
      gap: 16px;
      min-height: 0;
    }

    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .app-box {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .box {
      width: 100%;
      font-size: 16px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      resize: vertical;
      font-family: "Consolas", "Courier New", monospace;
      min-height: 180px;
      background: #fbfdff;
    }

    button {
      padding: 10px 14px;
      font-size: 15px;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover:not(:disabled) {
      background: var(--brand-strong);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    #submitBtn {
      width: 100%;
    }

    #logoutBtn {
      width: auto;
      min-width: 0;
      background: transparent;
      color: #ffffff;
      padding: 0;
      border-radius: 0;
    }

    #logoutBtn:hover:not(:disabled) {
      background: transparent;
      text-decoration: underline;
    }

    #logoutBtn:active:not(:disabled) {
      transform: none;
    }

    .sidebar {
      width: 280px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      transition: width 0.25s ease;
      overflow: hidden;
    }

    .sidebar.collapsed {
      width: 66px;
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      min-height: 52px;
    }

    .sidebar-title {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
    }

    .collapse-btn {
      width: auto;
      height: auto;
      border-radius: 0;
      padding: 0;
      font-size: 16px;
      line-height: 1;
      background: transparent;
      color: var(--ink);
    }

    .sidebar-content {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      overflow: auto;
    }

    .history-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.08s ease;
      user-select: none;
    }

    .history-item:hover {
      background: var(--history-hover);
      border-color: #bfdbfe;
    }

    .history-item:active {
      transform: scale(0.99);
    }

    .history-item.active {
      background: var(--history-active);
      border-color: #93c5fd;
    }


    .sidebar.collapsed .sidebar-title,
    .sidebar.collapsed .sidebar-content {
      display: none;
    }

    @media (max-width: 980px) {
      .main {
        flex-direction: column;
      }

      .sidebar,
      .sidebar.collapsed {
        width: 100%;
      }

      .sidebar.collapsed .sidebar-title,
      .sidebar.collapsed .sidebar-content {
        display: block;
      }
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <header class="topbar">
      <div id="welcomeText" class="welcome">Structure Your Data</div>
      <div class="topbar-right">
        <div class="tiny-title">Hi there!</div>
        <span id="logoutBtn" role="link" tabindex="0" style="cursor: pointer;">Logout</span>
      </div>
    </header>

    <div class="main">
      <div class="workspace">
        <div class="app-box">
          <textarea id="outputBox" class="box" placeholder="Structured output will appear here..." disabled></textarea>
          <textarea id="inputBox" class="box" placeholder="Type here..."></textarea>
          <button id="submitBtn">Structure it!</button>
        </div>
      </div>

      <aside id="historySidebar" class="sidebar">
        <div class="sidebar-head">
          <button id="collapseBtn" class="collapse-btn" aria-label="Collapse sidebar">&gt;</button>
          <div class="sidebar-title">History</div>
        </div>
        <div class="sidebar-content">
         
          <ul id="historyList" class="history-list">
            <li class="history-item active">Generate a JSON schema for customer records</li>
            <li class="history-item">Convert meeting notes into structured action items</li>
          </ul>
        </div>
      </aside>
    </div>
  </div>


  <script>
    const historySidebar = document.getElementById("historySidebar");
    const collapseBtn = document.getElementById("collapseBtn");

    collapseBtn.addEventListener("click", () => {
      const isCollapsed = historySidebar.classList.toggle("collapsed");
      collapseBtn.innerHTML = isCollapsed ? "&lt;" : "&gt;";
      collapseBtn.setAttribute("aria-label", isCollapsed ? "Expand sidebar" : "Collapse sidebar");
    });
	
	const API_URL = "__API_URL__/project-stage/generate";

    const inputBox = document.getElementById("inputBox");
    const outputBox = document.getElementById("outputBox");
    const submitBtn = document.getElementById("submitBtn");

submitBtn.addEventListener("click", async () => {
  const prompt = inputBox.value.trim();
  const idToken = localStorage.getItem("app_id_token");

  if (!prompt) {
    outputBox.value = "Please enter some text.";
    return;
  }

  if (!idToken) {
    outputBox.value = "You are not logged in.";
    window.location.href = "login.html";
    return;
  }

  submitBtn.disabled = true;
  outputBox.value = "Processing...";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${idToken}`
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    if (!res.ok) {
      outputBox.value = JSON.stringify(data, null, 2);
      return;
    }

    outputBox.value = JSON.stringify(data.output, null, 2);

  } catch (error) {
    outputBox.value = "Error! " + error.message;
  } finally {
    submitBtn.disabled = false;
  }
});
  </script>

</body>
</html>
